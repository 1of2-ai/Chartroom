name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Fetch model payloads
        run: |
          git lfs pull \
            --include "Sources/IndexEngineJina/Resources/CoreML/JinaV5OmniSmall.bundle/**" \
            --exclude ""

      - name: Package model assets
        run: Scripts/package-model-assets.sh dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "Chartroom ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/JinaV5OmniSmall.bundle.*.zip dist/SHA256SUMS
